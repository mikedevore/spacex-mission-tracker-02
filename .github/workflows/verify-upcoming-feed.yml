name: Verify Upcoming Feed Preview

on:
  pull_request:
    branches:
      - fix/live-feed-preview
  workflow_dispatch:

jobs:
  verify-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PREVIEW_URL: https://spacex-mission-tracker-02-git-fix-upc-3cddcd-vectore-on-labs-ai.vercel.app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build application
        run: |
          npm ci
          npm run build

      - name: Install browser verifier
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Wait for Vercel preview
        shell: bash
        run: |
          ready=0
          for attempt in {1..30}; do
            status=$(curl --location --silent --show-error --output /tmp/preview.html --write-out "%{http_code}" "$PREVIEW_URL" || true)
            if [ "$status" = "200" ] && grep -q 'id="root"' /tmp/preview.html; then
              ready=1
              break
            fi
            sleep 10
          done
          if [ "$ready" != "1" ]; then
            echo "Preview did not become available"
            exit 1
          fi

      - name: Verify mission buttons and LL2 detail proxy
        run: |
          cat > /tmp/verify-preview.cjs <<'NODE'
          const fs = require('fs');
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 1600, height: 1200 } });
            const consoleErrors = [];
            page.on('console', message => {
              if (message.type() === 'error') consoleErrors.push(message.text());
            });
            page.on('pageerror', error => consoleErrors.push(error.message));

            await page.goto(process.env.PREVIEW_URL, { waitUntil: 'domcontentloaded', timeout: 120000 });
            await page.waitForSelector('.upcoming-panel .feed-item', { timeout: 60000 });
            await page.waitForFunction(() => {
              const panel = document.querySelector('.upcoming-panel');
              return panel && !panel.textContent.includes('Retrieving queue...');
            }, { timeout: 60000 });
            await page.waitForTimeout(15000);

            const missions = await page.$$eval('.upcoming-panel .feed-item[data-mission]', items => items.map(item => {
              const link = item.querySelector('.feed-video-link');
              return {
                id: item.getAttribute('data-mission') || '',
                name: item.querySelector('strong')?.textContent?.trim() || '',
                label: link?.textContent?.trim() || '',
                href: link?.href || '',
                linkType: link?.getAttribute('data-link-type') || '',
              };
            }));

            if (missions.length < 3) throw new Error(`Expected at least 3 upcoming missions, found ${missions.length}`);
            const missingButtons = missions.filter(mission => !mission.href);
            if (missingButtons.length) throw new Error(`Missing live buttons: ${missingButtons.map(m => m.name).join(', ')}`);

            const genericProfile = missions.filter(mission => /^https:\/\/(?:www\.)?x\.com\/SpaceX\/?$/i.test(mission.href));
            if (genericProfile.length) throw new Error(`Generic SpaceX profile used as webcast: ${genericProfile.map(m => m.name).join(', ')}`);

            const proxyChecks = [];
            for (const mission of missions.filter(m => m.id.startsWith('ll2-')).slice(0, 8)) {
              const id = mission.id.slice(4);
              const response = await page.request.get(`${process.env.PREVIEW_URL}/api/ll2-launch?id=${encodeURIComponent(id)}`);
              proxyChecks.push({ id, status: response.status(), ok: response.ok() });
            }
            const failedProxyChecks = proxyChecks.filter(check => !check.ok);
            if (failedProxyChecks.length) throw new Error(`LL2 detail proxy failures: ${JSON.stringify(failedProxyChecks)}`);

            const confirmed = missions.filter(m => m.linkType === 'confirmed-webcast');
            if (confirmed.length < 2) throw new Error(`Expected at least two confirmed direct webcasts, found ${confirmed.length}`);

            const report = {
              checkedAt: new Date().toISOString(),
              previewUrl: process.env.PREVIEW_URL,
              missionCount: missions.length,
              confirmedCount: confirmed.length,
              fallbackCount: missions.length - confirmed.length,
              missions,
              proxyChecks,
              consoleErrors,
            };

            fs.writeFileSync('/tmp/upcoming-feed-report.json', JSON.stringify(report, null, 2));
            await page.screenshot({ path: '/tmp/upcoming-feed-preview.png', fullPage: true });
            console.log(JSON.stringify(report, null, 2));
            await browser.close();
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE
          node /tmp/verify-preview.cjs

      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upcoming-feed-verification
          path: |
            /tmp/upcoming-feed-report.json
            /tmp/upcoming-feed-preview.png
          if-no-files-found: warn
